name: Build installers

# Build the macOS .dmg and the Windows .exe on their native runners.
# Triggers:
#   - manual run (Actions tab -> "Run workflow")
#   - push of a version tag like v1.0.0  -> also publishes a GitHub Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: dmg
          - os: windows-latest
            platform: win
            artifact: exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS (.dmg)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --x64 --arm64 --publish never
        env:
          # No code-signing certificate -> disable signing so the build succeeds.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Windows (.exe)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: mcdu-app-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          generate_release_notes: true
